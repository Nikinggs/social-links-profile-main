<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>

    body {
      background-color: hsl(0, 0%, 8%);
      font-size: 14px;
    }

    .main {
      background-color: hsl(0, 0%, 12%);
      font-family: "Inter", sans-serif;
      padding: 20px;
      margin: 50px 50px;
      border-radius: 10px;
    }

    .hero {
      text-align: center;
      color: white;
      padding-top: 20px;
      margin-bottom: 20px;
    }

    .img {
      width: 108px;
      height: 108px;
      border-radius: 54px;
    }

    .jes {
      padding-top: 20px;
      padding-bottom: 10px;
      font-weight: 600;
      font-size:x-large;
    }

    .lon {
      padding-bottom: 30px;
      color: hsl(75, 94%, 57%);
      font-weight: 400;
    }

    .para {
      color: hsl(0, 0%, 30%);
      font-weight: 300;
    }

    .sect {
      color: white;
      margin: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }

    .sect1 {
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      border-radius: 5px;
    }
    .sect2 {
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      border-radius: 5px;
    }
    .sect3 {
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      border-radius: 5px;
    }
    .sect4 {
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      border-radius: 5px;
    }
    .sect5 {
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      border-radius: 5px;
    }

    

    .attribution { font-size: 0.6875rem; text-align: center; 
      color: hsl(0, 0%, 20%);
    }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="main">

    <section class="hero">
      <img src="/assets/images/avatar-jessica.jpeg" alt="Jessica picture" class="img">
      <div class="jes" >
        Jessica Randall
      </div>

      <div class="lon">London, United Kingdom</div>

      <div class="para">
        "Front-end developer and avid reader."
      </div>
    
    </section>
  
    <section class="sect">

      <section class="sect1">GitHub</section>

  <section class="sect2">Frontend Mentor</section>
  
  <section class="sect3">LinkedIn</section>
  
  <section class="sect4"> Twitter</section>

  <section class="sect5">Instagram</section>

    </section>

  
 
  

  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Adeniyi Olanrewaju, ADESHINA.</a>.
  </footer>
</body>
</html>
